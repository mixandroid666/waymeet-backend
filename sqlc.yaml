version: "2"
sql:
  - engine: "postgresql"
    schema: "db/migrations"
    queries: "db/queries"
    gen:
      go:
        package: "dbgen"
        out: "internal/platform/storage/dbgen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        # PostGIS geography has no native Go mapping; treat as text and
        # parse/format with ST_AsText / ST_GeogFromText in queries, or
        # swap to a geometry type later.
        overrides:
          - db_type: "geography"
            go_type: "string"
            nullable: true
